name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_MIN: "75"
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  # ── Path-based change detection ───────────────────────────────────
  # Inverted logic: '**' matches every file, then '!' excludes docs/images.
  # If ANY changed file is NOT a doc, 'code' is true → run CI.
  # If ALL changed files are docs/images, 'code' is false → skip CI.
  # On push/workflow_dispatch the filter always evaluates to true.
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!plans/**'
              - '!docs/**/*.md'
              - '!CHANGELOG.md'
              - '!CONTRIBUTING.md'
              - '!**/*.png'
              - '!**/*.jpg'
              - '!**/*.svg'
              - '!LICENSE'
              - '!.gitignore'
      - id: decide
        run: |
          # On push/workflow_dispatch always run; on PR skip if only docs changed
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.filter.outputs.code }}" == "true" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Lint ──────────────────────────────────────────────────────────
  lint:
    needs: changes
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: make lint

  # ── Test matrix ───────────────────────────────────────────────────
  test:
    needs: [lint, changes]
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Test
        run: pytest tests/ -q

  # ── Coverage ──────────────────────────────────────────────────────
  coverage:
    needs: [lint, changes]
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Coverage
        run: |
          pytest tests/ \
            --cov=paperfarm \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=${COVERAGE_MIN}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Security: pip-audit ───────────────────────────────────────────
  security-audit:
    needs: changes
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies from frozen lockfile
        run: |
          uv sync --frozen
          uv pip install --system pip-audit

      - name: Audit dependencies for known vulnerabilities
        run: |
          uv export --frozen --no-hashes -o /tmp/requirements-audit.txt
          pip-audit -r /tmp/requirements-audit.txt

  # ── Package smoke test ────────────────────────────────────────────
  package-smoke:
    needs: [lint, changes]
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build and install wheel
        run: |
          uv pip install --system build
          python -m build
          uv pip install --system dist/*.whl

      - name: Smoke CLI entrypoint
        run: paperfarm --help > /dev/null

